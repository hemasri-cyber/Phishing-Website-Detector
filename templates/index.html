<!DOCTYPE html>
<html>
  <head>
    <title>Phishing Website Detector</title>

    <style>
      body {
        background: linear-gradient(to right, #0f172a, #1e293b);
        color: white;
        text-align: center;
        font-family: Arial;
        margin-top: 80px;
      }

      .container {
        width: 500px;
        margin: auto;
        padding: 40px;

        background-color: #111827;

        border-radius: 15px;

        box-shadow: 0px 0px 20px #38bdf8;
      }

      h1 {
        color: #38bdf8;
        margin-bottom: 30px;
      }

      input {
        width: 90%;
        padding: 15px;

        border: none;
        border-radius: 8px;

        margin-bottom: 20px;

        font-size: 16px;
      }

      button {
        padding: 15px 30px;

        background-color: #22c55e;

        color: white;

        border: none;
        border-radius: 8px;

        font-size: 16px;

        cursor: pointer;
      }

      button:hover {
        background-color: #16a34a;
      }

      h2 {
        margin-top: 30px;

        color: #facc15;
      }

      p {
        color: #94a3b8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🔐 Phishing Website Detector</h1>

      <p>Detect suspicious and phishing URLs using Machine Learning</p>

      <form action="/predict" method="post">
        <input
          type="text"
          name="url"
          placeholder="Enter Website URL"
          required
        />

        <br />

        <button type="submit">Check URL</button>
      </form>

      <h2>{{ prediction_text }}</h2>
    </div>
  </body>
</html>
